<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PIRGL</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f6f6f4;
      color: #111;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 32px;
    }

    .holding {
      max-width: 720px;
      text-align: center;
    }

    .brand {
      font-size: 13px;
      letter-spacing: 0.2em;
      font-weight: 600;
      opacity: 0.65;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(40px, 7vw, 72px);
      font-weight: 500;
      line-height: 1.04;
      margin-bottom: 22px;
    }

    p {
      font-size: 18px;
      line-height: 1.7;
      opacity: 0.72;
    }

    .note {
      margin-top: 28px;
      font-size: 14px;
      opacity: 0.5;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <main class="holding">
    <div class="brand">PIRGL</div>
    <h1>This website is currently under reconstruction.</h1>
    <p>
      A new version of pirgl.com is in progress.<br>
      Please check back soon.
    </p>
  </main>
</body>
</html>
